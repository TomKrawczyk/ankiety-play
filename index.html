<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>4ECO Field Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080e;--bg2:#0f0f18;--bg3:#16161f;--card:#1a1a25;--card2:#20202d;
  --green:#00ff88;--green2:#00cc6a;--purple:#a78bfa;--blue:#60a5fa;--orange:#fb923c;--red:#f87171;--yellow:#fbbf24;
  --text:#f0f0ff;--muted:#64748b;--border:#252535;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* PARTICLES */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.pt{position:absolute;border-radius:50%;animation:ptFloat linear infinite;opacity:0}
@keyframes ptFloat{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.5}90%{opacity:0.1}100%{transform:translateY(-50px);opacity:0}}

/* ============ AUTH ============ */
#authScreen{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px}
.auth-bg-glow{position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(0,255,136,0.12) 0%,transparent 65%);border-radius:50%;top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-icon{font-size:3.8em;animation:logoPulse 2.5s ease-in-out infinite;display:inline-block;filter:drop-shadow(0 0 18px rgba(0,255,136,0.6))}
@keyframes logoPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.08) rotate(3deg)}}
.logo-title{font-size:1.9em;font-weight:900;background:linear-gradient(135deg,var(--green) 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1.5px;margin-top:6px}
.logo-sub{font-size:0.75em;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:26px 22px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:slideUp 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.auth-card::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.atabs{display:flex;background:var(--bg3);border-radius:12px;padding:3px;gap:3px;margin-bottom:20px}
.atab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-size:0.82em;font-weight:800;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.atab.active{background:var(--green);color:#000;box-shadow:0 2px 10px rgba(0,255,136,0.3)}
.aform{display:none}.aform.active{display:block}
.afield{margin-bottom:14px}
.afield label{display:block;font-size:0.72em;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.afield input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:0.92em;color:var(--text);background:var(--bg3);transition:all 0.2s;font-family:'Inter',sans-serif;-webkit-appearance:none}
.afield input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,136,0.12);background:var(--card2)}
.remember{display:flex;align-items:center;gap:8px;margin-bottom:18px;cursor:pointer}
.remember input{width:16px;height:16px;accent-color:var(--green)}
.remember span{font-size:0.8em;color:var(--muted)}
.btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:14px;font-size:0.98em;font-weight:900;cursor:pointer;box-shadow:0 6px 24px rgba(0,255,136,0.35);transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.3px}
.btn-auth:active{transform:scale(0.97)}
.aerr{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);border-radius:10px;padding:9px 12px;font-size:0.8em;color:var(--red);margin-bottom:12px;display:none}
.aok{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.25);border-radius:10px;padding:9px 12px;font-size:0.8em;color:var(--green);margin-bottom:12px;display:none}
.ahint{text-align:center;font-size:0.76em;color:var(--muted);margin-top:12px}

/* ============ APP ============ */
#appScreen{display:none;position:relative;z-index:10;min-height:100vh}

/* HEADER */
.hdr{background:rgba(10,10,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.4),transparent);animation:scan 3s linear infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.9em;color:#000;flex-shrink:0;box-shadow:0 0 12px rgba(0,255,136,0.3)}
.hdr-name{font-weight:800;font-size:0.88em;line-height:1.2}
.hdr-lv{font-size:0.7em;color:var(--green);font-weight:700}
.xp-pill{background:var(--bg3);border:1px solid rgba(0,255,136,0.2);border-radius:20px;padding:5px 12px;font-size:0.76em;font-weight:800;color:var(--green);display:flex;align-items:center;gap:5px;box-shadow:0 0 8px rgba(0,255,136,0.1)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 9px;font-size:0.7em;cursor:pointer;font-family:'Inter',sans-serif}

/* XP BAR */
.xpbar-wrap{background:var(--bg2);padding:7px 14px;border-bottom:1px solid var(--border)}
.xpbar-info{display:flex;justify-content:space-between;font-size:0.7em;color:var(--muted);margin-bottom:4px}
.xpbar-info span:first-child{color:var(--green);font-weight:700}
.xpbar{height:5px;background:var(--bg3);border-radius:5px;overflow:hidden}
.xpbar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:5px;box-shadow:0 0 8px rgba(0,255,136,0.4);transition:width 0.7s cubic-bezier(.34,1.56,.64,1)}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 6px;text-align:center}
.sc .sv{font-size:1.15em;font-weight:900;line-height:1}
.sc .sl{font-size:0.6em;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.sc.g .sv{color:var(--green)}.sc.o .sv{color:var(--orange)}.sc.p .sv{color:var(--purple)}.sc.y .sv{color:var(--yellow)}

/* MISSIONS */
.missions{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;position:relative;overflow:hidden;transition:all 0.2s}
.mc.done{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.04)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--blue))}
.mc.done::before{background:linear-gradient(90deg,var(--green),var(--green2))}
.mc-icon{font-size:1.3em;margin-bottom:3px}
.mc-title{font-size:0.72em;font-weight:700;line-height:1.3;margin-bottom:5px;color:var(--text)}
.mc-bar{height:3px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:3px}
.mc-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:3px;transition:width 0.5s}
.mc.done .mc-bar-fill{background:var(--green)}
.mc-xp{font-size:0.65em;color:var(--green);font-weight:800}

/* MODE SWITCH */
.msw{display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.msb{flex:1;padding:12px 8px;border:none;background:transparent;cursor:pointer;font-size:0.8em;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Inter',sans-serif;line-height:1.3}
.msb.active{color:var(--green);border-bottom-color:var(--green)}
.msb span{display:block;font-size:0.68em;font-weight:400;color:var(--muted);margin-top:1px}
.msb.active span{color:rgba(0,255,136,0.6)}
.mpanel{display:none}.mpanel.active{display:block}

/* ============ QUESTION FLOW (Typeform style) ============ */
.qflow{padding:0;max-width:600px;margin:0 auto}
.qflow-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.qflow-prog-wrap{flex:1;height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-right:12px}
.qflow-prog{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width 0.4s}
.qflow-count{font-size:0.72em;color:var(--muted);font-weight:700;white-space:nowrap}
.qslide{display:none;padding:16px;animation:qIn 0.35s cubic-bezier(.34,1.56,.64,1)}
.qslide.active{display:block}
@keyframes qIn{from{opacity:0;transform:translateX(40px) scale(0.97)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes qOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px 18px;position:relative;overflow:hidden}
.qcard::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--green);border-radius:4px 0 0 4px}
.qcard.blue::before{background:var(--blue)}.qcard.purple::before{background:var(--purple)}.qcard.orange::before{background:var(--orange)}
.qnum{font-size:0.68em;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.qtitle{font-size:1.1em;font-weight:800;line-height:1.35;margin-bottom:4px}
.qhint{font-size:0.77em;color:var(--muted);margin-bottom:16px;line-height:1.4}

/* BIG CHOICE BUTTONS */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--bg3);border:2px solid var(--border);border-radius:14px;cursor:pointer;transition:all 0.2s;font-size:0.88em;font-weight:600;color:var(--text);-webkit-appearance:none;width:100%;text-align:left;font-family:'Inter',sans-serif}
.choice:hover,.choice.selected{border-color:var(--green);background:rgba(0,255,136,0.06);color:var(--green)}
.choice.selected{box-shadow:0 0 0 1px var(--green),0 4px 16px rgba(0,255,136,0.15)}
.choice:active{transform:scale(0.98)}
.choice-icon{font-size:1.4em;flex-shrink:0;width:32px;text-align:center}
.choice-text{flex:1}
.choice-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:0.7em}
.choice.selected .choice-check{background:var(--green);border-color:var(--green);color:#000}
.choices.multi .choice.selected{border-color:var(--purple);background:rgba(167,139,250,0.06);color:var(--purple);box-shadow:0 0 0 1px var(--purple)}
.choices.multi .choice.selected .choice-check{background:var(--purple);border-color:var(--purple);color:#fff}
.choices.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choices.grid2 .choice{flex-direction:column;align-items:center;text-align:center;padding:14px 10px;gap:6px}
.choices.grid2 .choice-check{display:none}
.choices.grid2 .choice-icon{font-size:1.8em;width:auto}

/* EMOJI SCALE */
.emoji-scale{display:flex;gap:6px;justify-content:space-between}
.es-btn{flex:1;padding:12px 4px;background:var(--bg3);border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Inter',sans-serif}
.es-btn .es-emoji{font-size:1.6em;display:block;margin-bottom:4px}
.es-btn .es-label{font-size:0.6em;color:var(--muted);display:block;font-weight:600}
.es-btn:hover,.es-btn.selected{border-color:var(--green);background:rgba(0,255,136,0.08);transform:scale(1.05)}
.es-btn.selected{box-shadow:0 4px 14px rgba(0,255,136,0.2)}

/* TEXT INPUT */
.q-input{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:14px;font-size:0.95em;color:var(--text);background:var(--bg3);transition:all 0.2s;font-family:'Inter',sans-serif;-webkit-appearance:none}
.q-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,136,0.1);background:var(--card2)}
.q-input::placeholder{color:var(--muted)}

/* TEMP SELECTOR */
.temp-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ts-btn{padding:14px 10px;background:var(--bg3);border:2px solid var(--border);border-radius:14px;cursor:pointer;text-align:center;font-family:'Inter',sans-serif;transition:all 0.25s cubic-bezier(.34,1.56,.64,1)}
.ts-btn .ts-icon{font-size:1.6em;display:block;margin-bottom:4px}
.ts-btn .ts-label{font-size:0.8em;font-weight:800;display:block;color:var(--text)}
.ts-btn .ts-desc{font-size:0.66em;color:#94a3b8;display:block;margin-top:2px}
.ts-btn[data-v=Zimny].sel{border-color:var(--blue);background:rgba(96,165,250,0.1);box-shadow:0 4px 16px rgba(96,165,250,0.2)}
.ts-btn[data-v=Letni].sel{border-color:var(--yellow);background:rgba(251,191,36,0.1);box-shadow:0 4px 16px rgba(251,191,36,0.2)}
.ts-btn[data-v=Ciepły].sel{border-color:var(--orange);background:rgba(251,146,60,0.1);box-shadow:0 4px 16px rgba(251,146,60,0.2)}
.ts-btn[data-v=Gorący].sel{border-color:var(--green);background:rgba(0,255,136,0.1);box-shadow:0 6px 20px rgba(0,255,136,0.25);transform:scale(1.03)}
.ts-btn.sel{transform:scale(1.03)}

/* NAV BUTTONS */
.qnav{display:flex;gap:8px;margin-top:16px}
.btn-next{flex:1;padding:14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:14px;font-size:0.95em;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,255,136,0.3)}
.btn-next:active{transform:scale(0.97)}
.btn-next.blue{background:linear-gradient(135deg,var(--blue),#3b82f6);box-shadow:0 4px 16px rgba(96,165,250,0.3)}
.btn-next.purple{background:linear-gradient(135deg,var(--purple),#8b5cf6);box-shadow:0 4px 16px rgba(167,139,250,0.3)}
.btn-next.orange{background:linear-gradient(135deg,var(--orange),#f97316);box-shadow:0 4px 16px rgba(251,146,60,0.3)}
.btn-back{padding:14px 18px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:14px;font-size:0.88em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:16px;font-size:1em;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 6px 24px rgba(0,255,136,0.4);transition:all 0.2s;margin-top:16px;letter-spacing:0.3px}
.btn-submit.blue{background:linear-gradient(135deg,var(--blue),#3b82f6)}
.btn-submit.purple{background:linear-gradient(135deg,var(--purple),#8b5cf6)}
.btn-submit.orange{background:linear-gradient(135deg,var(--orange),#f97316)}
.btn-submit:active{transform:scale(0.98)}

/* REVIEW */
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:14px 0}
.rv{background:var(--bg3);border-radius:10px;padding:9px 11px}
.rv-label{font-size:0.63em;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.rv-val{font-size:0.84em;font-weight:700;color:var(--text)}

/* TOAST, CONFETTI, ACHIEVEMENTS */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,#1a2e1a,#1a2e2e);border:1px solid var(--green);color:var(--green);padding:12px 22px;border-radius:14px;font-weight:800;font-size:0.88em;z-index:9999;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,255,136,0.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
.confetti-p{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.ach{position:fixed;bottom:20px;left:12px;right:12px;max-width:360px;margin:0 auto;background:var(--card);border:1.5px solid var(--green);border-radius:16px;padding:13px 16px;z-index:9997;display:flex;align-items:center;gap:12px;box-shadow:0 8px 28px rgba(0,255,136,0.2);transform:translateY(100px);transition:transform 0.4s cubic-bezier(.34,1.56,.64,1)}
.ach.show{transform:translateY(0)}
.ach-icon{font-size:2em;flex-shrink:0}
.ach-badge{font-size:0.62em;color:var(--green);font-weight:800;text-transform:uppercase;letter-spacing:1px}
.ach-name{font-size:0.86em;font-weight:800;margin:1px 0;color:var(--text)}
.ach-xp{font-size:0.72em;color:var(--muted)}
.xp-float{position:fixed;font-size:1.5em;font-weight:900;color:var(--green);pointer-events:none;z-index:9999;animation:xpup 1.2s ease forwards;text-shadow:0 0 10px rgba(0,255,136,0.5)}
@keyframes xpup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.6)}}
.lv-flash{position:fixed;inset:0;background:linear-gradient(135deg,rgba(0,255,136,0.12),rgba(167,139,250,0.12));pointer-events:none;z-index:9996;animation:lvf 0.5s ease forwards}
@keyframes lvf{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

/* SUCCESS */
.success-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;background:var(--bg)}
.success-icon{font-size:5em;animation:bounceIn 0.6s cubic-bezier(.34,1.56,.64,1);margin-bottom:10px}
@keyframes bounceIn{0%{transform:scale(0.2);opacity:0}60%{transform:scale(1.1)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
.success-xp{font-size:2.2em;font-weight:900;color:var(--green);letter-spacing:-1px;animation:slideUp 0.4s ease 0.2s both}
.success-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;width:100%;max-width:380px;margin:14px 0}
.success-card.glow{border-color:rgba(0,255,136,0.3);box-shadow:0 0 24px rgba(0,255,136,0.1)}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.srow:last-child{margin-bottom:0}
.srow-label{font-size:0.74em;color:var(--muted)}
.srow-val{font-size:0.84em;font-weight:800;color:var(--text)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.sgrid-item{background:var(--bg3);border-radius:10px;padding:10px 6px;text-align:center}
.sgrid-item .sv{font-size:1.2em;font-weight:900;color:var(--text)}
.sgrid-item .sl{font-size:0.62em;color:var(--muted);margin-top:2px}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:var(--card2);border-bottom:1px solid var(--border);padding:0 8px;gap:2px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tbtn{padding:10px 13px;border:none;background:transparent;cursor:pointer;font-size:0.76em;font-weight:700;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;font-family:'Inter',sans-serif}
.tbtn.active{color:var(--green);border-bottom-color:var(--green)}
.tpanel{display:none}.tpanel.active{display:block}
.footer{text-align:center;font-size:0.68em;color:var(--muted);padding:20px 0 32px}

/* HISTORY */
.hitem{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;animation:slideUp 0.3s ease}
.hitem-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hitem-name{font-size:0.92em;font-weight:800}
.hitem-date{font-size:0.68em;color:var(--muted)}
.hitem-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hitem-cell{background:var(--bg3);border-radius:8px;padding:6px 9px}
.hitem-cell .hl{font-size:0.6em;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.hitem-cell .hv{font-size:0.78em;font-weight:700;margin-top:1px;color:var(--text)}
.hitem-temp{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72em;font-weight:800;margin-top:8px}
.hempty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.88em}


/* ============ COMBO MULTIPLIER ============ */
#comboBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  display: none;
  flex-direction: column;
  align-items: stretch;
  pointer-events: none;
}
.combo-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 14px 3px;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(6px);
}
.combo-label {
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #aaa;
  text-transform: uppercase;
}
.combo-value {
  font-size: 1em;
  font-weight: 900;
  color: #00ff88;
  transition: color 0.4s;
  letter-spacing: 0.5px;
}
.combo-value.x1   { color: #aaa; }
.combo-value.x125 { color: #fbbf24; }
.combo-value.x150 { color: #fb923c; }
.combo-value.x175 { color: #f87171; }
.combo-value.x200 { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
.combo-timer {
  font-size: 0.68em;
  color: #888;
  font-variant-numeric: tabular-nums;
}
.combo-progress {
  height: 3px;
  background: rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.combo-fill {
  height: 100%;
  border-radius: 0 2px 2px 0;
  transition: width 1s linear, background 0.4s;
  background: #00ff88;
}
.combo-fill.x1   { background: #555; }
.combo-fill.x125 { background: #fbbf24; }
.combo-fill.x150 { background: #fb923c; }
.combo-fill.x175 { background: #f87171; }
.combo-fill.x200 { background: #00ff88; box-shadow: 0 0 6px #00ff88; }

/* Popup combo boost */
@keyframes comboPop {
  0%   { transform: translateX(-50%) scale(0.5); opacity:0; }
  40%  { transform: translateX(-50%) scale(1.15); opacity:1; }
  70%  { transform: translateX(-50%) scale(0.95); opacity:1; }
  100% { transform: translateX(-50%) scale(1); opacity:0; }
}
.combo-popup {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) scale(0.5);
  background: rgba(0,0,0,0.9);
  border: 2px solid #00ff88;
  border-radius: 14px;
  padding: 10px 22px;
  font-size: 1.1em;
  font-weight: 900;
  color: #00ff88;
  z-index: 9998;
  pointer-events: none;
  white-space: nowrap;
  animation: comboPop 1.6s ease forwards;
}


/* ============ RANKING ============ */
.rank-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  margin-bottom: 8px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s;
}
.rank-card:active { transform: scale(0.98); }
.rank-card.rank-1 { border-color: #f59e0b; background: rgba(245,158,11,0.07); }
.rank-card.rank-2 { border-color: #94a3b8; background: rgba(148,163,184,0.06); }
.rank-card.rank-3 { border-color: #cd7c3a; background: rgba(205,124,58,0.06); }
.rank-pos {
  font-size: 1.3em;
  font-weight: 900;
  min-width: 34px;
  text-align: center;
  color: var(--muted);
}
.rank-card.rank-1 .rank-pos { color: #f59e0b; }
.rank-card.rank-2 .rank-pos { color: #94a3b8; }
.rank-card.rank-3 .rank-pos { color: #cd7c3a; }
.rank-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00ff88, #0ea5e9);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1em; font-weight: 900; color: #000;
  flex-shrink: 0;
}
.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-size: 0.9em; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.rank-sub {
  font-size: 0.68em; color: var(--muted); margin-top: 2px;
}
.rank-xp {
  text-align: right;
  flex-shrink: 0;
}
.rank-xp-val {
  font-size: 1em; font-weight: 900; color: #00ff88;
}
.rank-xp-lbl { font-size: 0.62em; color: var(--muted); }
.rank-bar-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,0.05);
}
.rank-bar {
  height: 100%; background: linear-gradient(90deg,#00ff88,#0ea5e9);
  border-radius: 0 1px 1px 0;
  transition: width 0.6s ease;
}
.rank-you {
  position: absolute; top: 6px; right: 8px;
  font-size: 0.58em; font-weight: 700;
  color: #00ff88; letter-spacing: 0.5px;
  text-transform: uppercase;
  background: rgba(0,255,136,0.12);
  padding: 1px 5px; border-radius: 4px;
}
.rank-empty {
  text-align: center; color: var(--muted);
  padding: 40px 20px; font-size: 0.85em;
}
.rank-tabs {
  display: flex; gap: 6px; padding: 10px 10px 6px;
}
.rank-tab {
  flex: 1; padding: 6px 4px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; font-size: 0.72em; font-weight: 700;
  color: var(--muted); cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.rank-tab.active {
  background: rgba(0,255,136,0.12);
  border-color: #00ff88; color: #00ff88;
}

// ======================================================
// FLOW ENGINE
// ======================================================
var flows = {};

function buildFlow(containerId, questions, sheetName, color, xpAmount) {
  var container = document.getElementById(containerId);
  var state = { current: 0, answers: {}, questions: questions, sheetName: sheetName, color: color||'', xpAmount: xpAmount||50 };
  flows[containerId] = state;
  renderQ(containerId);
}

function renderQ(fid) {
  var s = flows[fid];
  var container = document.getElementById(fid);
  var q = s.questions[s.current];
  var total = s.questions.length;
  var pct = Math.round((s.current / total) * 100);
  var isLast = s.current === total - 1;

  var html = '<div class="qflow-header"><div class="qflow-prog-wrap"><div class="qflow-prog" style="width:'+pct+'%"></div></div><div class="qflow-count">'+(s.current+1)+'/'+total+'</div></div>';
  html += '<div class="qslide active"><div class="qcard '+(s.color||'')+'">';
  html += '<div class="qnum">Pytanie '+(s.current+1)+'</div>';
  html += '<div class="qtitle">'+q.title+'</div>';
  if(q.hint) html += '<div class="qhint">'+q.hint+'</div>';

  var savedVal = s.answers[q.id];

  if(q.type==='text') {
    html += '<input class="q-input" id="qi_'+fid+'" type="'+(q.id==='tel'?'tel':'text')+'" placeholder="'+(q.placeholder||'')+'" value="'+(savedVal||'')+'" inputmode="'+(q.id==='tel'?'tel':'text')+'">';
  } else if(q.type==='textarea') {
    html += '<textarea class="q-input" id="qi_'+fid+'" rows="3" placeholder="'+(q.placeholder||'')+'" style="resize:none">'+(savedVal||'')+'</textarea>';
  } else if(q.type==='choice') {
    html += '<div class="choices">';
    q.choices.forEach(function(c,i){
      var sel = savedVal===c.text?' selected':'';
      html += '<button class="choice'+sel+'" onclick="selectChoice(\''+fid+'\',\''+c.text.replace(/'/g,'\\\'')+'\')" >';
      html += '<span class="choice-icon">'+c.icon+'</span><span class="choice-text">'+c.text+'</span>';
      html += '<span class="choice-check">'+(sel?' ✓':'')+'</span></button>';
    });
    html += '</div>';
  } else if(q.type==='multi') {
    var savedArr = savedVal || [];
    html += '<div class="choices multi">';
    q.choices.forEach(function(c){
      var sel = savedArr.indexOf(c.text)>-1?' selected':'';
      html += '<button class="choice'+sel+'" onclick="toggleMulti(\''+fid+'\',\''+c.text.replace(/'/g,'\\\'')+'\')">';
      html += '<span class="choice-icon">'+c.icon+'</span><span class="choice-text">'+c.text+'</span>';
      html += '<span class="choice-check">'+(sel?' ✓':'')+'</span></button>';
    });
    html += '</div>';
  } else if(q.type==='emoji') {
    html += '<div class="emoji-scale">';
    q.opts.forEach(function(o){
      var sel = savedVal===o.label?' selected':'';
      html += '<button class="es-btn'+sel+'" onclick="selectEmoji(\''+fid+'\',\''+o.label+'\')"><span class="es-emoji">'+o.emoji+'</span><span class="es-label">'+o.label+'</span></button>';
    });
    html += '</div>';
  } else if(q.type==='temp') {
    html += '<div class="temp-sel">';
    [{v:'Zimny',icon:'🔵',desc:'Mało zainteresowany'},{v:'Letni',icon:'🟡',desc:'Słucha, zastanawia się'},{v:'Ciepły',icon:'🟠',desc:'Wyraźnie zainteresowany'},{v:'Gorący',icon:'🔥',desc:'Chce spotkania!'}].forEach(function(t){
      var sel = savedVal===t.v?' sel':'';
      html += '<button class="ts-btn'+sel+'" data-v="'+t.v+'" onclick="selectTemp2(\''+fid+'\',\''+t.v+'\')">';
      html += '<span class="ts-icon">'+t.icon+'</span><span class="ts-label">'+t.v+'</span><span class="ts-desc">'+t.desc+'</span></button>';
    });
    html += '</div>';
  }

  // Nav
  html += '<div class="qnav">';
  if(s.current > 0) html += '<button class="btn-back" onclick="prevQ(\''+fid+'\')">← Wróć</button>';
  if(isLast) {
    html += '<button class="btn-submit '+(s.color||'')+'" onclick="submitFlow(\''+fid+'\')">✅ Zapisz +'+s.xpAmount+' XP</button>';
  } else {
    html += '<button class="btn-next '+(s.color||'')+'" onclick="nextQ(\''+fid+'\')">Dalej →</button>';
  }
  html += '</div>';

  html += '</div></div>';
  container.innerHTML = html;
  // Focus input
  setTimeout(function(){ var inp=document.getElementById('qi_'+fid); if(inp) inp.focus(); },300);
}

function selectChoice(fid, val) {
  flows[fid].answers[flows[fid].questions[flows[fid].current].id] = val;
  renderQ(fid);
  setTimeout(function(){ nextQ(fid); }, 220);
}

function toggleMulti(fid, val) {
  var q = flows[fid].questions[flows[fid].current];
  var arr = flows[fid].answers[q.id] || [];
  var idx = arr.indexOf(val);
  if(idx>-1) arr.splice(idx,1); else arr.push(val);
  flows[fid].answers[q.id] = arr;
  renderQ(fid);
}

function selectEmoji(fid, val) {
  flows[fid].answers[flows[fid].questions[flows[fid].current].id] = val;
  renderQ(fid);
  setTimeout(function(){ nextQ(fid); }, 220);
}

function selectTemp2(fid, val) {
  flows[fid].answers[flows[fid].questions[flows[fid].current].id] = val;
  renderQ(fid);
}

function nextQ(fid) {
  var s = flows[fid];
  var q = s.questions[s.current];
  // Save text/textarea
  var inp = document.getElementById('qi_'+fid);
  if(inp) s.answers[q.id] = inp.value;
  // Validate required
  if(q.req) {
    var val = s.answers[q.id];
    if(!val||val.toString().trim()===''){
      var inpEl = document.getElementById('qi_'+fid);
      if(inpEl){ inpEl.style.borderColor='var(--red)'; inpEl.focus(); }
      showToast('⚠️ To pole jest wymagane!');
      return;
    }
  }
  if(s.current < s.questions.length-1){
    s.current++;
    renderQ(fid);
    window.scrollTo(0, document.querySelector('#'+fid+' .qflow-header') ? document.querySelector('#'+fid).offsetTop - 10 : 0);
  }
}

function prevQ(fid) {
  var s = flows[fid];
  var inp = document.getElementById('qi_'+fid);
  if(inp) s.answers[s.questions[s.current].id] = inp.value;
  if(s.current > 0){ s.current--; renderQ(fid); }
}

function submitFlow(fid) {
  var s = flows[fid];
  var inp = document.getElementById('qi_'+fid);
  if(inp) s.answers[s.questions[s.current].id] = inp.value;
  var a = s.answers;
  // Build payload
  var interesy = Array.isArray(a.int) ? a.int.join(', ') : (a.int||'');
  var data = {
    sheet_name: s.sheetName,
    typ_ankiety: fid,
    ankieter: window._user||'',
    data_wizyty: new Date().toLocaleDateString('pl-PL'),
    miejscowosc: a.msc||'',
    imie: a.imie||'',
    telefon: a.tel||'',
    kod_pocztowy: a.kod||'',
    typ_obj: a.typ||'',
    rachunek_prad: a.rachunek||'',
    koszt_ogrzew: a.koszt||a.koszt_ogrzew||'',
    ma_pv: a.pv||a.pv_status||'',
    zrodlo_ciepla: a.ogrzew||'',
    wiek_kotla: a.wiek_budynku||'',
    interesy: interesy,
    motyw: a.motyw||'',
    decyzja: a.decyzja||'',
    bol: a.bol||'',
    rachunki_ogol: a.rachunki_ogol||'',
    temp_leada: a.temp||'',
    uwagi: a.uwagi||''
  };
  if(!data.telefon){showToast('⚠️ Brak telefonu klienta!'); s.current=0; renderQ(fid); return;}
  sendData(data, s.xpAmount, data.temp_leada==='Gorący', fid);
}

function sendData(data, xp, isHot, fid) {
  var btns = document.querySelectorAll('#'+fid+' .btn-submit, #'+fid+' .btn-next');
  btns.forEach(function(b){b.disabled=true;b.textContent='Zapisuję...';});

  // Content-Type: text/plain omija preflight CORS i redirect w Apps Script
  fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.text(); })
  .then(function(txt){
    try {
      var res = JSON.parse(txt);
      if(res.status === 'error') { showToast('⚠️ Błąd arkusza: ' + res.message); }
    } catch(e) {}
    afterSave(data, xp, isHot, fid);
  })
  .catch(function(){
    // fetch rzuca błąd przy no-cors redirect — ale dane i tak dotarły
    afterSave(data, xp, isHot, fid);
  });
}

function pushRanking(name, xp, total, hot, streak, todayCount) {
  var today = new Date().toLocaleDateString('pl-PL');
  var payload = {
    action:  'updateRanking',
    name:    name,
    xp:      xp,
    total:   total,
    hot:     hot,
    streak:  streak,
    today:   todayCount,
    date:    today
  };
  fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).catch(function(){}); // silent - nie blokujemy UI
}

function afterSave(data, xp, isHot, fid) {
  // Oblicz XP z mnożnikiem combo
  var mult = getMultiplier();
  var finalXp = Math.round(xp * mult);
  saveToHistory(data);
  if(window._user) addXP(window._user, finalXp, isHot);
  // Zwiększ combo na następną ankietę
  comboHit();
  confettiBlast();
  floatXP('+'+finalXp+' XP' + (mult > 1 ? ' ×'+mult.toFixed(2) : ''));
  if(isHot) setTimeout(function(){floatXP('🔥 HOT!');},400);
  var multTxt = mult > 1 ? ' (×'+mult.toFixed(2)+' combo!)' : '';
  showToast(isHot?'🔥 GORĄCY LEAD! +'+finalXp+' XP'+multTxt:'✅ Zapisano! +'+finalXp+' XP'+multTxt);
  setTimeout(function(){showSuccess(data.typ_ankiety, data.temp_leada, finalXp, fid);},700);
}

var UK='4eco_u', SK='4eco_s';
function getUsers(){try{return JSON.parse(localStorage.getItem(UK))||{};}catch(e){return {};}}
function saveUsers(u){localStorage.setItem(UK,JSON.stringify(u));}
function getSession(){try{return JSON.parse(localStorage.getItem(SK));}catch(e){return null;}}
function saveSession(n){localStorage.setItem(SK,JSON.stringify({name:n}));}
function clearSession(){localStorage.removeItem(SK);}

function switchTab(tab,btn){
  document.querySelectorAll('.atab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.aform').forEach(function(f){f.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(tab==='login'?'loginForm':'regForm').classList.add('active');
}

function doRegister(){
  var n=document.getElementById('rName').value.trim(),p=document.getElementById('rPin').value,p2=document.getElementById('rPin2').value;
  var err=document.getElementById('regErr'),ok=document.getElementById('regOk');
  err.style.display='none';ok.style.display='none';
  if(!n){err.textContent='Wpisz imię i nazwisko.';err.style.display='block';return;}
  if(!/^\d{4}$/.test(p)){err.textContent='PIN musi mieć 4 cyfry.';err.style.display='block';return;}
  if(p!==p2){err.textContent='PINy się nie zgadzają.';err.style.display='block';return;}
  var us=getUsers(),k=n.toLowerCase();
  if(us[k]){err.textContent='Konto istnieje — zaloguj się.';err.style.display='block';return;}
  us[k]={name:n,pin:p,xp:0,total:0,hot:0,streak:0,lastDay:'',achs:[]};
  saveUsers(us);ok.textContent='Konto utworzone!';ok.style.display='block';
  setTimeout(function(){document.getElementById('lName').value=n;switchTab('login',document.querySelector('.atab'));},1200);
}

function doLogin(){
  var n=document.getElementById('lName').value.trim(),p=document.getElementById('lPin').value;
  var err=document.getElementById('loginErr');err.style.display='none';
  var us=getUsers(),u=us[n.toLowerCase()];
  if(!u||u.pin!==p){err.textContent='Nieprawidłowe dane.';err.style.display='block';return;}
  if(document.getElementById('lRemember').checked) saveSession(u.name);
  launchApp(u.name);
}

function doLogout(){clearSession();location.reload();}

function getStats(name){
  var u=getUsers()[name.toLowerCase()]||{};
  var today=new Date().toLocaleDateString('pl-PL');
  var td=0;try{var t=JSON.parse(localStorage.getItem('4eco_td_'+name.toLowerCase()))||{};td=t.d===today?(t.c||0):0;}catch(e){}
  return {xp:u.xp||0,total:u.total||0,hot:u.hot||0,streak:u.streak||0,today:td,lastDay:u.lastDay||'',achs:u.achs||[]};
}

function addXP(name,amount,isHot){
  var us=getUsers(),k=name.toLowerCase();
  if(!us[k]) return;
  var today=new Date().toLocaleDateString('pl-PL');
  var oldLv=getLv(us[k].xp||0).level;
  us[k].xp=(us[k].xp||0)+amount;
  us[k].total=(us[k].total||0)+1;
  if(isHot) us[k].hot=(us[k].hot||0)+1;
  if(us[k].lastDay===today){}
  else if(isYest(us[k].lastDay)) us[k].streak=(us[k].streak||0)+1;
  else us[k].streak=1;
  us[k].lastDay=today;
  try{var td=JSON.parse(localStorage.getItem('4eco_td_'+k))||{};var cnt=(td.d===today?td.c:0)+1;localStorage.setItem('4eco_td_'+k,JSON.stringify({d:today,c:cnt}));}catch(e){}
  saveUsers(us);
  checkAchs(name);
  updateUI(name);
  var newLv=getLv(us[k].xp||0).level;
  if(newLv>oldLv){lvFlash();showToast('🎉 LEVEL UP! Jesteś Level '+newLv+'!');}
  // Push statystyk do globalnego rankingu w arkuszu
  var todayC=0;try{var _td=JSON.parse(localStorage.getItem('4eco_td_'+k))||{};todayC=_td.d===today?(_td.c||0):0;}catch(e){}
  pushRanking(us[k].name,us[k].xp||0,us[k].total||0,us[k].hot||0,us[k].streak||0,todayC);
}

function isYest(ds){
  if(!ds) return false;
  try{var p=ds.split('.');var d=new Date(+p[2],+p[1]-1,+p[0]);var y=new Date();y.setDate(y.getDate()-1);return d.toDateString()===y.toDateString();}catch(e){return false;}
}

function getLv(xp){
  var lv={level:1,name:'Rookie',icon:'🌱',nextXp:100,progress:0};
  for(var i=LEVELS.length-1;i>=0;i--){
    if(xp>=LEVELS[i].min){
      lv.level=i+1;lv.name=LEVELS[i].name;lv.icon=LEVELS[i].icon;
      lv.nextXp=LEVELS[i+1]?LEVELS[i+1].min:9999;
      lv.progress=LEVELS[i+1]?Math.min(100,Math.round((xp-LEVELS[i].min)/(LEVELS[i+1].min-LEVELS[i].min)*100)):100;
      break;
    }
  }
  return lv;
}

function checkAchs(name){
  var us=getUsers(),k=name.toLowerCase();
  if(!us[k]) return;
  var s=getStats(name);
  if(!us[k].achs) us[k].achs=[];
  var changed=false;
  ACHS.forEach(function(a){
    if(us[k].achs.indexOf(a.id)===-1&&a.check(s)){
      us[k].achs.push(a.id);us[k].xp=(us[k].xp||0)+a.xp;changed=true;
      setTimeout(function(ac){showAch(ac);},800,a);
    }
  });
  if(changed) saveUsers(us);
}

function showAch(a){
  var p=document.getElementById('achPop');
  document.getElementById('achIcon').textContent=a.icon;
  document.getElementById('achName').textContent=a.name;
  document.getElementById('achXp').textContent='+'+a.xp+' XP';
  p.classList.add('show');
  setTimeout(function(){p.classList.remove('show');},4000);
}

function updateUI(name){
  var s=getStats(name),lv=getLv(s.xp);
  document.getElementById('hdrAv').textContent=name.charAt(0).toUpperCase();
  document.getElementById('hdrName').textContent=name;
  document.getElementById('hdrLv').textContent='Level '+lv.level+' · '+lv.icon+' '+lv.name;
  document.getElementById('xpTotal').textContent=s.xp;
  document.getElementById('xpBarLabel').textContent=lv.icon+' Level '+lv.level+' — '+lv.name;
  document.getElementById('xpBarNext').textContent=s.xp+'/'+lv.nextXp+' XP';
  document.getElementById('xpFill').style.width=lv.progress+'%';
  document.getElementById('stTotal').textContent=s.total;
  document.getElementById('stStreak').textContent=s.streak+'🔥';
  document.getElementById('stHot').textContent=s.hot;
  document.getElementById('stToday').textContent=s.today;
  renderMissions(s);
}

function renderMissions(s){
  var ms=[
    {icon:'⚡',title:'5 ankiet dziś',target:5,cur:s.today,xp:'+100XP'},
    {icon:'🔥',title:'3 gorące leady',target:3,cur:Math.min(s.hot,3),xp:'+150XP'},
    {icon:'🔗',title:'Streak 3 dni',target:3,cur:Math.min(s.streak,3),xp:'+75XP'},
    {icon:'💎',title:'10 ankiet łącznie',target:10,cur:Math.min(s.total,10),xp:'+200XP'}
  ];
  var h='';
  ms.forEach(function(m){
    var pct=Math.min(100,Math.round(m.cur/m.target*100));
    var done=m.cur>=m.target;
    h+='<div class="mc'+(done?' done':'')+'"><div class="mc-icon">'+m.icon+(done?' ✅':'')+'</div>'+
      '<div class="mc-title">'+m.title+'</div>'+
      '<div class="mc-bar"><div class="mc-bar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="mc-xp">'+m.cur+'/'+m.target+' · '+m.xp+'</div></div>';
  });
  document.getElementById('missionRow').innerHTML=h;
}

// ======================================================
// HISTORY (localStorage)
// ======================================================
var HIST_KEY = '4eco_hist_';

function saveToHistory(data) {
  var k = HIST_KEY + (window._user||'anon').toLowerCase();
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem(k)) || []; } catch(e) {}
  data._saved = new Date().toLocaleString('pl-PL');
  hist.unshift(data);
  if(hist.length > 100) hist = hist.slice(0,100);
  localStorage.setItem(k, JSON.stringify(hist));
}

function getHistory() {
  var k = HIST_KEY + (window._user||'anon').toLowerCase();
  try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e) { return []; }
}

function clearHistory() {
  if(!confirm('Usunąć całą historię?')) return;
  var k = HIST_KEY + (window._user||'anon').toLowerCase();
  localStorage.removeItem(k);
  renderHistory();
}

function renderHistory() {
  var hist = getHistory();
  var el = document.getElementById('historyList');
  if(!el) return;
  if(hist.length === 0) {
    el.innerHTML = '<div class="hempty">📭 Brak zapisanych ankiet<br><span style="font-size:0.85em">Zapisane ankiety pojawią się tutaj</span></div>';
    return;
  }
  var tempCol = {Zimny:'#60a5fa',Letni:'#fbbf24',Ciepły:'#fb923c',Gorący:'#00ff88'};
  var tempEm  = {Zimny:'🔵',Letni:'🟡',Ciepły:'🟠',Gorący:'🔥'};
  var html = '<div style="font-size:0.72em;color:var(--muted);margin-bottom:10px">'+hist.length+' zapisanych ankiet</div>';
  hist.forEach(function(h, i) {
    var tc = tempCol[h.temp_leada] || '#aaa';
    var te = tempEm[h.temp_leada] || '';
    html += '<div class="hitem">';
    html += '<div class="hitem-top"><div class="hitem-name">'+(h.imie||'Brak nazwy')+'</div><div class="hitem-date">'+h._saved+'</div></div>';
    html += '<div class="hitem-grid">';
    html += '<div class="hitem-cell"><div class="hl">Telefon</div><div class="hv">'+(h.telefon||'—')+'</div></div>';
    html += '<div class="hitem-cell"><div class="hl">Miejscowość</div><div class="hv">'+(h.miejscowosc||'—')+'</div></div>';
    html += '<div class="hitem-cell"><div class="hl">Kod pocztowy</div><div class="hv">'+(h.kod_pocztowy||'—')+'</div></div>';
    html += '<div class="hitem-cell"><div class="hl">Typ</div><div class="hv">'+(h.typ_ankiety||'—')+'</div></div>';
    if(h.ma_pv) html += '<div class="hitem-cell"><div class="hl">PV</div><div class="hv">'+h.ma_pv+'</div></div>';
    if(h.zrodlo_ciepla) html += '<div class="hitem-cell"><div class="hl">Ogrzewanie</div><div class="hv">'+h.zrodlo_ciepla+'</div></div>';
    if(h.rachunek_prad) html += '<div class="hitem-cell"><div class="hl">Rachunek</div><div class="hv">'+h.rachunek_prad+'</div></div>';
    if(h.interesy) html += '<div class="hitem-cell" style="grid-column:1/-1"><div class="hl">Zainteresowania</div><div class="hv">'+h.interesy+'</div></div>';
    if(h.uwagi) html += '<div class="hitem-cell" style="grid-column:1/-1"><div class="hl">Uwagi</div><div class="hv">'+h.uwagi+'</div></div>';
    html += '</div>';
    if(h.temp_leada) html += '<div class="hitem-temp" style="color:'+tc+';border:1px solid '+tc+';background:'+tc+'22">'+te+' '+h.temp_leada+'</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

// ============================================================
// COMBO MULTIPLIER SYSTEM
// 5 min okno — każda ankieta zwiększa mnożnik
// Brak ankiety przez 5 min → reset do ×1.00
// ×1.00 → ×1.25 → ×1.50 → ×1.75 → ×2.00 (max)
// ============================================================
var COMBO_WINDOW   = 5 * 60;   // 5 minut w sekundach
var COMBO_STEPS    = [1.00, 1.25, 1.50, 1.75, 2.00];
var COMBO_CLASSES  = ['x1',  'x125', 'x150', 'x175', 'x200'];
var COMBO_KEY      = '4eco_combo';

var _comboTick  = null;   // setInterval timer
var _comboSec   = COMBO_WINDOW; // pozostały czas w sekundach

function loadCombo() {
  try {
    var raw = localStorage.getItem(COMBO_KEY);
    if (!raw) return { step: 0, ts: 0 };
    return JSON.parse(raw);
  } catch(e) { return { step: 0, ts: 0 }; }
}

function saveCombo(step) {
  localStorage.setItem(COMBO_KEY, JSON.stringify({ step: step, ts: Date.now() }));
}

function getCurrentStep() {
  var d = loadCombo();
  var elapsed = (Date.now() - d.ts) / 1000;
  if (elapsed >= COMBO_WINDOW) return 0;          // wygasł
  return Math.min(d.step, COMBO_STEPS.length - 1);
}

function getMultiplier() {
  return COMBO_STEPS[getCurrentStep()];
}

// Wywołaj po zapisaniu ankiety — zwiększa combo
function comboHit() {
  var d = loadCombo();
  var elapsed = (Date.now() - d.ts) / 1000;
  var curStep = (elapsed >= COMBO_WINDOW) ? 0 : Math.min(d.step, COMBO_STEPS.length - 1);
  var newStep = Math.min(curStep + 1, COMBO_STEPS.length - 1);
  saveCombo(newStep);
  renderComboBar(newStep, COMBO_WINDOW);
  // Popup
  if (newStep > 0) {
    var mult = COMBO_STEPS[newStep];
    showComboPopup('⚡ COMBO ×' + mult.toFixed(2) + '!');
  }
  startComboTick();
}

function showComboPopup(txt) {
  var el = document.createElement('div');
  el.className = 'combo-popup';
  el.textContent = txt;
  document.body.appendChild(el);
  setTimeout(function() { try { document.body.removeChild(el); } catch(e){} }, 1700);
}

function renderComboBar(step, secLeft) {
  var bar = document.getElementById('comboBar');
  if (!bar) return;
  var mult = COMBO_STEPS[step];
  var cls  = COMBO_CLASSES[step];

  bar.style.display = 'flex';

  var val  = document.getElementById('comboVal');
  var fill = document.getElementById('comboFill');
  var tmr  = document.getElementById('comboTimer');

  if (val)  { val.textContent = '×' + mult.toFixed(2); val.className = 'combo-value ' + cls; }
  if (fill) { 
    var pct = Math.max(0, Math.min(100, (secLeft / COMBO_WINDOW) * 100));
    fill.style.width = pct + '%';
    fill.className = 'combo-fill ' + cls;
  }
  if (tmr) {
    var m = Math.floor(secLeft / 60);
    var s = Math.floor(secLeft % 60);
    tmr.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    // Miganie gdy < 60s
    tmr.style.color = secLeft < 60 ? (Math.floor(secLeft) % 2 === 0 ? '#f87171' : '#555') : '#888';
  }
}

function startComboTick() {
  if (_comboTick) clearInterval(_comboTick);
  var d = loadCombo();
  _comboTick = setInterval(function() {
    var elapsed = (Date.now() - d.ts) / 1000;
    var secLeft = Math.max(0, COMBO_WINDOW - elapsed);
    var step    = getCurrentStep();
    renderComboBar(step, secLeft);
    if (secLeft <= 0) {
      clearInterval(_comboTick);
      _comboTick = null;
      saveCombo(0);
      renderComboBar(0, 0);
      showToast('⏱️ Combo wygasło — mnożnik ×1.00');
    }
  }, 1000);
}

// Init przy starcie — jeśli jest aktywne combo, wznów odliczanie
function initCombo() {
  var d = loadCombo();
  var elapsed = (Date.now() - d.ts) / 1000;
  if (d.step > 0 && elapsed < COMBO_WINDOW) {
    renderComboBar(d.step, COMBO_WINDOW - elapsed);
    startComboTick();
  }
}


// ============================================================
// RANKING ANKIETERÓW — dane z Google Sheets (globalny)
// ============================================================
var _rankTab = 'xp';
var _rankCache = null; // cache danych z arkusza

function renderRanking() {
  var dateEl = document.getElementById('rankingDate');
  var container = document.getElementById('rankingList');
  if (!container) return;

  container.innerHTML = '<div class="rank-empty">⏳ Ładowanie rankingu...</div>';

  // Pobierz dane z arkusza (action=getRanking)
  fetch(WEBHOOK + '?action=getRanking', {
    method: 'GET',
    headers: { 'Content-Type': 'text/plain' }
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if (res.status !== 'ok' || !res.data) throw new Error('Brak danych');
    _rankCache = res.data;
    drawRanking(res.data);
    if (dateEl) {
      var now = new Date();
      dateEl.textContent = 'Stan na: ' + now.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
    }
  })
  .catch(function(e){
    // Fallback: localStorage
    _rankCache = null;
    drawRankingLocal();
    if (dateEl) dateEl.textContent = '⚠️ Tryb offline';
  });
}

function drawRankingLocal() {
  var users = getUsers();
  var today = new Date().toLocaleDateString('pl-PL');
  var list = [];
  Object.keys(users).forEach(function(k) {
    var u = users[k];
    var todayCount = 0;
    try { var td = JSON.parse(localStorage.getItem('4eco_td_'+k))||{}; todayCount = td.d===today?(td.c||0):0; } catch(e){}
    list.push({ name:u.name||k, xp:u.xp||0, total:u.total||0, hot:u.hot||0, today:todayCount, streak:u.streak||0 });
  });
  drawRanking(list);
}

function drawRanking(list) {
  var me = (window._user || '').toLowerCase();
  var container = document.getElementById('rankingList');
  if (!container) return;

  // Sortuj
  list.sort(function(a,b){ return b[_rankTab] - a[_rankTab]; });
  var maxVal = list.length > 0 ? (list[0][_rankTab] || 1) : 1;

  var tabs = [
    { key:'xp',    label:'⭐ XP'    },
    { key:'total', label:'📋 Ankiety'},
    { key:'hot',   label:'🔥 Gorące' },
    { key:'today', label:'📅 Dziś'  },
  ];
  var tabsHtml = '<div class="rank-tabs">' +
    tabs.map(function(t) {
      var activeCls = t.key === _rankTab ? ' active' : '';
      return '<div class="rank-tab' + activeCls + '" onclick="setRankTab(\'' + t.key + '\')">' + t.label + '</div>';
    }).join('') +
  '</div>';

  var cardsHtml = '';
  if (list.length === 0) {
    cardsHtml = '<div class="rank-empty">Brak danych w rankingu.</div>';
  } else {
    var medals = ['🥇','🥈','🥉'];
    list.forEach(function(u, i) {
      var pos     = i + 1;
      var isMe    = (u.name || '').toLowerCase() === me;
      var medal   = medals[i] || (pos + '.');
      var rankCls = pos <= 3 ? ' rank-' + pos : '';
      var pct     = maxVal > 0 ? Math.round((u[_rankTab] / maxVal) * 100) : 0;
      var initials= (u.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
      var val     = u[_rankTab] || 0;
      var valLabel= {xp:'XP', total:'ankiet', hot:'gorących', today:'dziś'}[_rankTab];
      var lv      = getLv(u.xp || 0);
      cardsHtml +=
        '<div class="rank-card' + rankCls + '">' +
          (isMe ? '<div class="rank-you">TY</div>' : '') +
          '<div class="rank-pos">' + medal + '</div>' +
          '<div class="rank-avatar">' + initials + '</div>' +
          '<div class="rank-info">' +
            '<div class="rank-name">' + u.name + '</div>' +
            '<div class="rank-sub">' + lv.icon + ' ' + lv.name +
              ' &nbsp;·&nbsp; 🎯 ' + (u.total||0) + ' ankiet' +
              (u.streak > 1 ? ' &nbsp;·&nbsp; 🔥 ' + u.streak + ' dni z rzędu' : '') +
            '</div>' +
          '</div>' +
          '<div class="rank-xp">' +
            '<div class="rank-xp-val">' + val + '</div>' +
            '<div class="rank-xp-lbl">' + valLabel + '</div>' +
          '</div>' +
          '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + pct + '%"></div></div>' +
        '</div>';
    });
  }
  container.innerHTML = tabsHtml + cardsHtml;
}

function setRankTab(tab) {
  _rankTab = tab;
  if (_rankCache) drawRanking(_rankCache);
  else renderRanking();
}
